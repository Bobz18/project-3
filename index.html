<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project 3 Climate Visualization</title>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>How Do Climate Scenarios Change Global Temperature by 2100?</h1>

  <p>
    This interactive D3 visualization compares projected global temperature warming
    under different CMIP6 climate scenarios.
  </p>

  <section class="controls">
    <label><input type="checkbox" value="ssp126" checked> SSP126</label>
    <label><input type="checkbox" value="ssp245" checked> SSP245</label>
    <label><input type="checkbox" value="ssp585" checked> SSP585</label>
    <br>

    <label>
        <input type="checkbox" id="range-toggle" checked>
        Show uncertainty range
    </label>
  </section>

  <section class="slider-box">
    <label>
      Show years up to:
      <input type="range" id="year-slider" min="2015" max="2100" value="2100">
      <span id="year-label">2100</span>
    </label>
  </section>

  <div id="chart"></div>


  <script src="main.js"></script>
</body>
</html>
